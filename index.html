<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Visita de Obra</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--az:#1a3a5c;--az2:#2a5a8c;--ac:#e8a020;--ro:#c0392b;--ve:#27ae60;--na:#e67e22;--bg:#f0f4f8;--su:#ffffff;--bo:#d0dae6;--tx:#1a2535;--t2:#5a6a7e;--t3:#8a9ab0;--r:12px;--s1:0 2px 12px rgba(26,58,92,.10);--s2:0 4px 24px rgba(26,58,92,.15)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
.hdr{background:var(--az);color:white;padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.hbk{background:none;border:none;color:white;font-size:26px;cursor:pointer;padding:0 8px;line-height:1}
.hdr h1{font-size:17px;font-weight:700;flex:1}
.tabs{display:flex;background:var(--su);border-top:1px solid var(--bo);position:fixed;bottom:0;left:0;right:0;z-index:100}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px 10px;cursor:pointer;border:none;background:none;color:var(--t3);font-family:inherit}
.tab.actv{color:var(--az)}
.ti{font-size:22px;line-height:1}
.tl{font-size:10px;font-weight:600;margin-top:3px}
.pg{display:none;padding:16px;padding-bottom:80px;min-height:80vh}
.pg.actv{display:block}
.card{background:var(--su);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;box-shadow:var(--s1);border:1px solid rgba(0,0,0,.04)}
.tap{cursor:pointer;transition:transform .15s}
.tap:active{transform:scale(.98)}
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:13px 20px;border-radius:var(--r);border:none;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;width:100%}
.bp{background:var(--az);color:white}
.bo2{background:transparent;color:var(--az);border:2px solid var(--az)}
.bd{background:var(--ro);color:white}
.bsm{padding:8px 14px;font-size:13px;width:auto;border-radius:8px}
.f{margin-bottom:14px}
.f label{display:block;font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.f input,.f textarea,.f select{width:100%;padding:11px 14px;border:1.5px solid var(--bo);border-radius:10px;font-family:inherit;font-size:15px;color:var(--tx);background:var(--su);outline:none}
.f input:focus,.f textarea:focus,.f select:focus{border-color:var(--az2)}
.f textarea{min-height:88px;resize:none}
.row{display:flex;gap:10px}
.row .f{flex:1}
.chips{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:4px}
.chip{padding:6px 13px;border-radius:999px;border:1.5px solid var(--bo);font-size:13px;font-weight:500;cursor:pointer;background:var(--su);color:var(--t2)}
.chip.actv{border-color:var(--az);background:rgba(26,58,92,.08);color:var(--az);font-weight:700}
.badge{display:inline-block;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:700}
.bv{background:rgba(39,174,96,.12);color:var(--ve)}
.bn{background:rgba(230,126,34,.12);color:var(--na)}
.br2{background:rgba(192,57,43,.12);color:var(--ro)}
.ba{background:rgba(26,58,92,.10);color:var(--az)}
.sec{font-size:13px;font-weight:700;color:var(--az);text-transform:uppercase;letter-spacing:.8px;margin:18px 0 8px;border-bottom:2px solid var(--az);padding-bottom:5px}
.fg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.ft{position:relative;aspect-ratio:1;border-radius:10px;overflow:hidden;background:var(--bg)}
.ft img{width:100%;height:100%;object-fit:cover}
.fdel{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.55);color:white;border:none;border-radius:50%;width:24px;height:24px;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.fadd{aspect-ratio:1;border-radius:10px;border:2px dashed var(--bo);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:4px;color:var(--t3);font-size:12px;background:var(--su)}
.fadd span{font-size:26px}
.abtn{display:flex;align-items:center;justify-content:center;gap:10px;padding:15px;border-radius:var(--r);border:2px solid var(--az);background:var(--su);cursor:pointer;font-family:inherit;font-size:15px;font-weight:600;color:var(--az);width:100%;margin-bottom:8px}
.abtn.rec{border-color:var(--ro);color:var(--ro);background:rgba(192,57,43,.06);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
.airow{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(26,58,92,.06);border-radius:10px;margin-bottom:6px}
.ii{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;border-radius:10px;margin-bottom:6px}
.il{background:rgba(39,174,96,.08);border-left:4px solid var(--ve)}
.im{background:rgba(230,126,34,.08);border-left:4px solid var(--na)}
.ig{background:rgba(192,57,43,.08);border-left:4px solid var(--ro)}
.gr{display:flex;gap:8px;margin-bottom:10px}
.gb{flex:1;padding:8px;border-radius:8px;border:2px solid;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;background:transparent}
.empty{text-align:center;padding:48px 24px;color:var(--t3)}
.ei{font-size:52px;margin-bottom:14px}
.empty h3{font-size:17px;color:var(--t2);margin-bottom:6px}
.empty p{font-size:14px;margin-bottom:20px}
.fab{position:fixed;bottom:76px;right:18px;width:56px;height:56px;border-radius:50%;background:var(--ac);color:white;border:none;font-size:30px;cursor:pointer;box-shadow:var(--s2);display:flex;align-items:center;justify-content:center;z-index:90}
.fab:active{transform:scale(.93)}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:flex-end}
.mo.actv{display:flex}
.ms{background:var(--su);border-radius:20px 20px 0 0;padding:20px 16px 36px;width:100%;max-height:92vh;overflow-y:auto}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.mh h2{font-size:19px;font-weight:700}
.mc{background:none;border:none;font-size:22px;cursor:pointer;color:var(--t2)}
.vf{width:48px;height:54px;background:var(--az);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0}
.vd{font-size:20px;font-weight:700;color:white;line-height:1}
.vm{font-size:10px;font-weight:600;color:rgba(255,255,255,.75);letter-spacing:.5px;margin-top:2px}
.tact{background:rgba(26,58,92,.07);border-radius:10px;padding:10px 14px;font-size:13px;color:var(--az);margin-bottom:8px;border-left:3px solid var(--az2);animation:pulse 1.5s infinite}
.tres{background:rgba(39,174,96,.06);border-radius:10px;padding:10px 14px;margin-bottom:8px;border-left:3px solid var(--ve)}
.toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);background:#1a2535;color:white;padding:10px 20px;border-radius:999px;font-size:14px;font-weight:500;z-index:500;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.actv{opacity:1}
.av{width:36px;height:36px;background:rgba(26,58,92,.12);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.cbrow{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--bo)}
.cbrow:last-child{border-bottom:none}
.cbrow input[type=checkbox]{width:20px;height:20px;cursor:pointer;accent-color:var(--az);flex-shrink:0}

/* ---- AUTH OVERLAY ---- */
#auth-overlay{position:fixed;inset:0;background:var(--az);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px}
#auth-overlay.hidden{display:none}
.auth-logo{font-size:52px;margin-bottom:8px}
.auth-title{color:white;font-size:22px;font-weight:700;margin-bottom:4px;text-align:center}
.auth-sub{color:rgba(255,255,255,.65);font-size:13px;margin-bottom:36px;text-align:center}
.auth-box{background:white;border-radius:16px;padding:24px 20px;width:100%;max-width:380px}
.auth-box .f label{color:var(--t2)}
.auth-err{background:rgba(192,57,43,.12);color:var(--ro);border-radius:8px;padding:10px 14px;font-size:13px;font-weight:600;margin-bottom:14px;display:none}
.auth-err.show{display:block}
.auth-spinner{display:none;justify-content:center;margin-top:12px}
.auth-spinner.show{display:flex}
.spin{width:24px;height:24px;border:3px solid rgba(26,58,92,.2);border-top-color:var(--az);border-radius:50%;animation:rot .7s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
.auth-user{position:fixed;top:0;right:0;z-index:150;padding:10px 12px;display:flex;align-items:center;gap:8px}
.auth-user-email{font-size:11px;color:rgba(255,255,255,.7);max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.auth-logout{background:rgba(255,255,255,.15);border:none;color:white;font-size:11px;font-weight:600;padding:4px 10px;border-radius:999px;cursor:pointer;font-family:inherit}
.auth-logout:hover{background:rgba(255,255,255,.25)}
</style>

  <div class="tabs">
    <button class="tab actv" id="tab-v" onclick="goTab('v')"><span class="ti">&#128203;</span><span class="tl">Visitas</span></button>
    <button class="tab" id="tab-r" onclick="goTab('r')"><span class="ti">&#128101;</span><span class="tl">Reuniones</span></button>
    <button class="tab" id="tab-i" onclick="goTab('i')"><span class="ti">&#128196;</span><span class="tl">Informes</span></button>

  </div>

    <div class="ms">
      <div class="mh"><h2>Nueva Obra</h2><button class="mc" onclick="closeMo('mo-obra')">X</button></div>
      <div class="f"><label>Nombre *</label><input id="obra-n" placeholder="Ej: Carretera CV-123"></div>
      <div class="f"><label>Promotor</label><input id="obra-p" placeholder="Nombre del promotor"></div>
      <div class="f"><label>Ubicacion</label><input id="obra-d" placeholder="Municipio, provincia..."></div>
      <button class="btn bp" onclick="crearObra()">Crear Obra</button>
    </div>
  </div>
  <div class="toast" id="toast"></div>
</div><!-- /app -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script>
// Firebase init
var firebaseConfig = {
  apiKey: "AIzaSyBWU7SGnSaLGchD0NUVLFJlbvh0vF6mNBU",
  authDomain: "gestiones-obra.firebaseapp.com",
  projectId: "gestiones-obra",
  storageBucket: "gestiones-obra.firebasestorage.app",
  messagingSenderId: "757797660271",
  appId: "1:757797660271:web:23a4a0afa2a6754c214f9a"
};
firebase.initializeApp(firebaseConfig);
var FSdb = firebase.firestore();
var FSauth = firebase.auth();

// Persistencia de sesión en el dispositivo (no cierra sesión al recargar)
FSauth.setPersistence(firebase.auth.Auth.Persistence.LOCAL);

// ---- AUTENTICACIÓN ----
FSauth.onAuthStateChanged(function(user) {
  if (user) {
    // Usuario autenticado: mostrar app
    document.getElementById('auth-overlay').classList.add('hidden');
    document.getElementById('app').style.display = '';
    document.getElementById('auth-badge').style.display = 'flex';
    document.getElementById('auth-user-email').textContent = user.email;
    // Iniciar sincronización solo tras login
    loadFromLocalStorage();
    rndObras();
    updFAB();
    uploadLocalToFirestore();
    initSync();
  } else {
    // No autenticado: mostrar pantalla de login
    document.getElementById('auth-overlay').classList.remove('hidden');
    document.getElementById('app').style.display = 'none';
    document.getElementById('auth-badge').style.display = 'none';
  }
});

function doLogin() {
  var email = document.getElementById('auth-email').value.trim();
  var pass  = document.getElementById('auth-pass').value;
  var errEl = document.getElementById('auth-err');
  var spinEl = document.getElementById('auth-spin');
  errEl.classList.remove('show');
  if (!email || !pass) { showAuthErr('Introduce email y contraseña.'); return; }
  spinEl.classList.add('show');
  FSauth.signInWithEmailAndPassword(email, pass)
    .then(function() { spinEl.classList.remove('show'); })
    .catch(function(e) {
      spinEl.classList.remove('show');
      var msg = 'Credenciales incorrectas.';
      if (e.code === 'auth/too-many-requests') msg = 'Demasiados intentos. Espera unos minutos.';
      if (e.code === 'auth/user-disabled') msg = 'Cuenta deshabilitada.';
      showAuthErr(msg);
    });
}

function doLogout() {
  if (!confirm('¿Cerrar sesión?')) return;
  FSauth.signOut();
}

function showAuthErr(msg) {
  var el = document.getElementById('auth-err');
  el.textContent = msg;
  el.classList.add('show');
}

// Enter key en el campo de contraseña
document.addEventListener('DOMContentLoaded', function() {
  var passEl = document.getElementById('auth-pass');
  if (passEl) passEl.addEventListener('keydown', function(e) { if (e.key === 'Enter') doLogin(); });
  var emailEl = document.getElementById('auth-email');
  if (emailEl) emailEl.addEventListener('keydown', function(e) { if (e.key === 'Enter') document.getElementById('auth-pass').focus(); });
});

// Cache local - se sincroniza con Firestore
var CACHE = { obras: [], visitas: [], reuniones: [], cfg: {}, asis: {} };
var SYNC_OK = false;

var DB = {
  // Lectura desde cache local
  obras: function() { return CACHE.obras; },
  visitas: function() { return CACHE.visitas; },
  reuniones: function() { return CACHE.reuniones; },
  cfg: function() { return CACHE.cfg; },
  aObra: function(id) { return CACHE.asis[id] || []; },

  // Escritura: guarda en cache Y sube a Firestore
  s: function(k, v) {
    CACHE[k] = v;
    localStorage.setItem(k, JSON.stringify(v));
    FSdb.collection('datos').doc(k).set({ valor: JSON.stringify(v) })
      .catch(function(e) { console.warn('Firestore write error:', e); });
  },
  sAObra: function(id, v) {
    if (!CACHE.asis) CACHE.asis = {};
    CACHE.asis[id] = v;
    localStorage.setItem('ao_' + id, JSON.stringify(v));
    FSdb.collection('datos').doc('ao_' + id).set({ valor: JSON.stringify(v) })
      .catch(function(e) { console.warn('Firestore write error:', e); });
  },
  saveCfg: function(v) {
    CACHE.cfg = v;
    localStorage.setItem('cfg', JSON.stringify(v));
    FSdb.collection('datos').doc('cfg').set({ valor: JSON.stringify(v) })
      .catch(function(e) { console.warn('Firestore write error:', e); });
  }
};

// Sincronizacion en tiempo real desde Firestore
function initSync() {
  FSdb.collection('datos').onSnapshot(function(snapshot) {
    snapshot.docChanges().forEach(function(change) {
      var id = change.doc.id;
      var raw = change.doc.data().valor;
      if (!raw) return;
      try {
        var val = JSON.parse(raw);
        if (id === 'obras') CACHE.obras = val;
        else if (id === 'visitas') CACHE.visitas = val;
        else if (id === 'reuniones') CACHE.reuniones = val;
        else if (id === 'cfg') CACHE.cfg = val;
        else if (id.indexOf('ao_') === 0) {
          if (!CACHE.asis) CACHE.asis = {};
          CACHE.asis[id.slice(3)] = val;
        }
        // Guardar tambien en localStorage como respaldo offline
        localStorage.setItem(id, raw);
      } catch(e) {}
    });
    if (!SYNC_OK) {
      SYNC_OK = true;
      // Primer sync completo - actualizar UI
      var dot = document.getElementById('sync-dot');
      if (dot) dot.style.background = '#4ade80';
      rndObras();
      console.log('Sincronizado con Firestore');
    } else {
      // Actualizar UI segun pagina activa
      refreshUI();
    }
  }, function(err) {
    console.warn('Firestore sync error:', err);
    // Fallback a localStorage si Firestore no disponible
    loadFromLocalStorage();
  });
}

function loadFromLocalStorage() {
  try { CACHE.obras = JSON.parse(localStorage.getItem('obras') || '[]'); } catch(e) { CACHE.obras = []; }
  try { CACHE.visitas = JSON.parse(localStorage.getItem('visitas') || '[]'); } catch(e) { CACHE.visitas = []; }
  try { CACHE.reuniones = JSON.parse(localStorage.getItem('reuniones') || '[]'); } catch(e) { CACHE.reuniones = []; }
  try { CACHE.cfg = JSON.parse(localStorage.getItem('cfg') || '{}'); } catch(e) { CACHE.cfg = {}; }
  CACHE.asis = {};
}

function refreshUI() {
  if (S.pg === 'obras') rndObras();
  else if (S.pg === 'obra-d') rndObraD();
  else if (S.pg === 'reuniones') rndReuniones();
  else if (S.pg === 'informes') rndInformes();
  else if (S.pg === 'vdet') rndVD();
  else if (S.pg === 'rdet') rndRD();
}

var uid = function() { return Date.now().toString(36) + Math.random().toString(36).slice(2); };
var MES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
var MESL = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
var TECS = ['Juan Manuel Benito', 'Monica Roman'];
var TDISP = ['Juan Manuel Benito', 'M\u00f3nica Rom\u00e1n'];
var CONV = [
  {id:'jmb', nom:'Juan Manuel Benito', emp:'Inserma Ingenieros, S.L.', email:'proyectos@insermaingenieros.com'},
  {id:'mr',  nom:'M\u00f3nica Rom\u00e1n',      emp:'Ayto de El Espinar.',     email:'iinfraespinar4@gmail.com'}
];
var EMLS = {'Juan Manuel Benito':'proyectos@insermaingenieros.com', 'Monica Roman':'infraestructuras@aytoelespinar.com'};
var CLIM = ['Despejado','Nublado','Lluvioso','Viento fuerte','Niebla','Nieve'];
var FASE = ['Demoliciones','Mvto Tierras','Servicios','Firmes'];
var GRV = {leve:'#27ae60', media:'#e67e22', grave:'#c0392b'};

var S = {
  pg: 'obras', stack: [],
  obraId: null, vidId: null, ridId: null,
  vFotos: [], vFSSO: [], vAud: [], vIncs: [],
  vF: {}, grab: false, mrec: null, mchunks: [],
  trans: false, srec: null, transT: '',
  rF: {}, rFijos: [], rChk: [], rExtra: [], rFotos: [],
  rGrab: false, rRec: null, rChunks: [], rAudUrl: null, rAudDur: 0, rGrabStart: null, rStream: null, rTimer: null, rGrabStart: null, rStream: null, rTimer: null,
  aOid: null
};

function showPg(id, push) {
  if (push === undefined) push = true;
  document.querySelectorAll('.pg').forEach(function(p) { p.classList.remove('actv'); });
  document.getElementById('pg-' + id).classList.add('actv');
  if (push && S.pg !== id) S.stack.push(S.pg);
  S.pg = id;
  updHdr(); updFAB();
  window.scrollTo(0, 0);
}

function goBack() {
  if (!S.stack.length) return;
  if (S.pg === 'asis') {
    var prev = S.stack.pop() || 'rform';
    S.rFijos = DB.aObra(S.aOid);
    while (S.rChk.length < S.rFijos.length) S.rChk.push(true);
    if (S.rChk.length > S.rFijos.length) S.rChk = S.rChk.slice(0, S.rFijos.length);
    document.querySelectorAll('.pg').forEach(function(p) { p.classList.remove('actv'); });
    document.getElementById('pg-' + prev).classList.add('actv');
    S.pg = prev; updHdr(); updFAB(); window.scrollTo(0, 0);
    rndRF(); return;
  }
  var prev = S.stack.pop();
  document.querySelectorAll('.pg').forEach(function(p) { p.classList.remove('actv'); });
  document.getElementById('pg-' + prev).classList.add('actv');
  S.pg = prev; updHdr(); updFAB(); window.scrollTo(0, 0);

  if (prev === 'reuniones') rndReuniones();
}

// ---- STORAGE METER ----
var LS_QUOTA = 5 * 1024 * 1024; // 5 MB estimado
function lsUsed() {
  var total = 0;
  try { for (var k in localStorage) { if (localStorage.hasOwnProperty(k)) total += (localStorage[k].length + k.length) * 2; } } catch(e) {}
  return total;
}
function fotosSizeActual() {
  var s = 0;
  S.vFotos.forEach(function(f) { s += f.d.length * 0.75; }); // base64 -> bytes aprox
  S.vFSSO.forEach(function(f)  { s += f.d.length * 0.75; });
  return s;
}
function getStorageMeter() {
  var used = lsUsed();
  var pct = Math.min(100, Math.round(used / LS_QUOTA * 100));
  var libre = Math.max(0, LS_QUOTA - used);
  // Estimar cuántas fotos más caben (aprox 120 KB/foto a calidad normal)
  var AVG_FOTO = 120 * 1024;
  var quedan = Math.floor(libre / AVG_FOTO);
  return { used: used, pct: pct, libre: libre, quedan: quedan };
}
function renderStorageMeter(sm) {
  var col = sm.pct < 60 ? 'var(--ve)' : sm.pct < 85 ? 'var(--na)' : 'var(--ro)';
  var txt = sm.pct < 95
    ? ('~' + sm.quedan + ' foto' + (sm.quedan !== 1 ? 's' : '') + ' restante' + (sm.quedan !== 1 ? 's' : ''))
    : '⚠️ Espacio casi lleno — guarda la visita';
  var h = '<div style="font-size:11px;color:var(--t3);display:flex;justify-content:space-between;margin-bottom:3px">';
  h += '<span>Almacenamiento local</span><span style="color:' + col + ';font-weight:700">' + sm.pct + '% usado — ' + txt + '</span></div>';
  h += '<div style="background:var(--bg);border-radius:999px;height:6px;overflow:hidden">';
  h += '<div style="height:100%;width:' + sm.pct + '%;background:' + col + ';border-radius:999px;transition:width .4s"></div></div>';
  return h;
}
function alertaEspacioLleno() {
  alert('No hay espacio suficiente para más fotos.\nGuarda la visita ahora y continúa en una nueva visita, o borra algunas fotos existentes.');
}

// Compresión adaptativa según espacio libre
function comprimir(file, cb) {
  var sm = getStorageMeter();
  // Dimensión máx y calidad adaptativas
  var M, Q;
  if (sm.pct < 50)      { M = 1200; Q = 0.75; }
  else if (sm.pct < 70) { M = 900;  Q = 0.65; }
  else if (sm.pct < 85) { M = 700;  Q = 0.55; }
  else                   { M = 500;  Q = 0.45; }

  var r = new FileReader();
  r.onload = function(e) {
    var img = new Image();
    img.onload = function() {
      var w = img.width, hh = img.height;
      if (w > M || hh > M) { if (w > hh) { hh = Math.round(hh*M/w); w=M; } else { w=Math.round(w*M/hh); hh=M; } }
      var c = document.createElement('canvas'); c.width=w; c.height=hh;
      c.getContext('2d').drawImage(img, 0, 0, w, hh);
      cb(c.toDataURL('image/jpeg', Q));
    };
    img.src = e.target.result;
  };
  r.readAsDataURL(file);
}

function onFotos(e, sso) {
  var files = Array.from(e.target.files);
  e.target.value = '';
  var loaded = 0, rechazadas = 0;
  var MARGEN = 300 * 1024; // reservar 300 KB para el resto del formulario

  function procesarSiguiente(idx) {
    if (idx >= files.length) {
      if (rechazadas > 0) toast('⚠️ ' + rechazadas + ' foto' + (rechazadas > 1 ? 's' : '') + ' no guardada' + (rechazadas > 1 ? 's' : '') + ' por falta de espacio');
      rndVF();
      return;
    }
    comprimir(files[idx], function(d) {
      var sm = getStorageMeter();
      var pesoFoto = d.length * 0.75; // aprox bytes
      if (sm.libre - pesoFoto < MARGEN) {
        rechazadas++;
        procesarSiguiente(idx + 1);
        return;
      }
      if (sso) S.vFSSO.push({d:d}); else S.vFotos.push({d:d});
      procesarSiguiente(idx + 1);
    });
  }

  procesarSiguiente(0);
}

function addInc() {

function togGrab() {
  if (S.grab) { S.mrec.stop(); S.grab = false; return; }
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream) {
    S.mchunks = []; S.mrec = new MediaRecorder(stream);
    var t0 = Date.now();
    S.mrec.ondataavailable = function(e) { S.mchunks.push(e.data); };
    S.mrec.onstop = function() {
      S.vAud.push({dur: Math.round((Date.now()-t0)/1000)});
      stream.getTracks().forEach(function(t) { t.stop(); });
      S.grab = false; rndVF();
    };
    S.mrec.start(); S.grab = true; rndVF();
  }).catch(function() { toast('No se pudo acceder al microfono'); });
}

function togTrans() {
  if (S.trans) { if (S.srec) S.srec.stop(); S.trans = false; rndVF(); return; }
  var SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { toast('Usa Chrome para transcripcion'); return; }
  lVF();
  var r = new SR(); r.lang = 'es-ES'; r.continuous = true; r.interimResults = false;
  r.onresult = function(e) { S.transT = Array.from(e.results).map(function(x) { return x[0].transcript; }).join(' '); rndVF(); };
  r.onerror = r.onend = function() { S.trans = false; rndVF(); };
  r.start(); S.srec = r; S.trans = true; rndVF();
}

function usarTrans() {
  lVF(); S.vF.obs = S.vF.obs ? S.vF.obs + '\n' + S.transT : S.transT;

function guardarV() {
  var te = document.getElementById('vft'), fe = document.getElementById('vff'), he = document.getElementById('vfh'), oe = document.getElementById('vfo'), se = document.getElementById('vfs');
  var tec = (te && te.value) ? te.value : S.vF.tec;
  var fecha = (fe && fe.value) ? fe.value : S.vF.fecha;
  var hora = (he && he.value) ? he.value : S.vF.hora;
  var obs = oe ? oe.value : S.vF.obs;
  var sso = se ? se.value : S.vF.sso;
  if (!tec) { toast('Selecciona un tecnico'); return; }
  var vis = DB.visitas();
  var v = {id:uid(), obraId:S.obraId, tec:tec, fecha:fecha, hora:hora, clim:S.vF.clim, fase:S.vF.fase, obs:obs, sso:sso, fotos:S.vFotos, fSSO:S.vFSSO, audios:S.vAud.map(function(a){return{dur:a.dur};}), incs:S.vIncs, createdAt:new Date().toISOString()};
  vis.push(v);
  // Intento 1: guardar con todas las fotos
  try {
    DB.s('visitas', vis); S.vidId = v.id;
    clearDraft();
    toast('Visita guardada (' + S.vFotos.length + ' fotos)'); rndVD(); showPg('vdet');
    return;
  } catch(e) {
    if (String(e).indexOf('uota') < 0) { alert('Error inesperado: ' + e); return; }
  }
  // Intento 2: reducir fotos progresivamente hasta que quepa
  var nOrigF = S.vFotos.length, nOrigS = S.vFSSO.length;
  var fotosR = S.vFotos.slice(), fotosS = S.vFSSO.slice();
  var guardado = false;
  while ((fotosR.length > 0 || fotosS.length > 0) && !guardado) {
    // Eliminar la última foto (SSO primero, luego generales)
    if (fotosS.length > 0) fotosS.pop(); else fotosR.pop();
    v.fotos = fotosR; v.fSSO = fotosS; vis[vis.length-1] = v;
    try { DB.s('visitas', vis); S.vidId = v.id; guardado = true; } catch(e2) {}
  }
  if (guardado) {
    var perdF = nOrigF - fotosR.length, perdS = nOrigS - fotosS.length;
    var msg = 'Visita guardada con ' + fotosR.length + '/' + nOrigF + ' fotos';
    if (perdF + perdS > 0) msg += '. Se perdieron ' + (perdF + perdS) + ' fotos por falta de espacio — borra visitas antiguas para liberar.';
    alert(msg);
    rndVD(); showPg('vdet');
  } else {
    // Último recurso: guardar sin ninguna foto
    v.fotos = []; v.fSSO = []; vis[vis.length-1] = v;
    try { DB.s('visitas', vis); S.vidId = v.id; alert('⚠️ Guardado sin fotos: almacenamiento completamente lleno.\nBorra visitas antiguas para liberar espacio.'); rndVD(); showPg('vdet'); }
    catch(e3) { alert('Error crítico — no se pudo guardar. Almacenamiento lleno.\n' + e3); }
  }
}

// ---- GRABACION REUNION ----
// Estado de grabacion activa - completamente separado de S para evitar contaminacion
var GRAB = {
  activa: false, rec: null, chunks: [], stream: null,
  timer: null, start: null, ridId: null,
  subiendo: false, blob: null, formTimer: null
};

function resetGRAB() {
  if (GRAB.timer) { clearInterval(GRAB.timer); GRAB.timer = null; }
  if (GRAB.rec && GRAB.activa) { try { GRAB.rec.stop(); } catch(e) {} }
  if (GRAB.stream) { GRAB.stream.getTracks().forEach(function(t) { t.stop(); }); }
  GRAB.activa = false; GRAB.rec = null; GRAB.chunks = [];
  GRAB.stream = null; GRAB.start = null; GRAB.blob = null; GRAB.subiendo = false;
  // NO tocamos GRAB.ridId aqui
}

function iniciarGrabR() {
  var ridParaEstaReunion = S.ridId;
  resetGRAB();
  GRAB.ridId = ridParaEstaReunion;
  GRAB.activa = true; // Marcar activa inmediatamente para que el boton desaparezca
  if (S.pg === 'rform') rndRF(); // Redibujar formulario sin boton
  navigator.mediaDevices.getUserMedia({audio: true, video: false}).then(function(stream) {
      GRAB.chunks = []; GRAB.stream = stream;
      var mtype = MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : 'audio/webm';
      GRAB.rec = new MediaRecorder(stream, {mimeType: mtype});
      GRAB.start = Date.now(); GRAB.activa = true;
      GRAB.rec.ondataavailable = function(e) { if (e.data.size > 0) GRAB.chunks.push(e.data); };
      GRAB.rec.onstop = function() {
        var dur = Math.round((Date.now() - GRAB.start) / 1000);
        var blob = new Blob(GRAB.chunks, {type: mtype});
        var ridFinal = GRAB.ridId;
        GRAB.blob = blob; GRAB.dur = dur; GRAB.activa = false;
        if (GRAB.stream) { GRAB.stream.getTracks().forEach(function(t) { t.stop(); }); GRAB.stream = null; }
        if (GRAB.timer) { clearInterval(GRAB.timer); GRAB.timer = null; }
        updGrabStatus();
        subirAudioFirebase(blob, dur, ridFinal);
      };
      GRAB.rec.start(1000);
      GRAB.timer = setInterval(function() { if (GRAB.activa) updGrabStatus(); }, 1000);
      updGrabStatus();

function subirAudioFirebase(blob, dur, ridId) {
  GRAB.subiendo = true; GRAB.blob = null;
  updGrabStatus();
  var r = DB.reuniones().find(function(x) { return x.id === ridId; });
  var o = r ? DB.obras().find(function(x) { return x.id === r.obraId; }) : null;
  var oNom = o ? o.nombre.replace(/[^a-zA-Z0-9]/g,'_') : 'reunion';
  var d = r ? new Date(r.fecha + 'T00:00:00') : new Date();
  var fname = oNom + '_reunion_' + d.getDate() + '_' + (d.getMonth()+1) + '_' + d.getFullYear() + '_' + ridId.slice(-6);

  updGrabStatus(); // Mostrar estado subiendo

  var formData = new FormData();
  var ext = blob.type.indexOf('mp4') >= 0 ? '.mp4' : '.webm';
  formData.append('file', blob, fname + ext);
  formData.append('upload_preset', 'visita_obra');
  formData.append('public_id', 'grabaciones/' + fname);
  formData.append('resource_type', 'video');

  var xhr = new XMLHttpRequest();
  xhr.open('POST', 'https://api.cloudinary.com/v1_1/dhfmmfxlc/video/upload');

  xhr.upload.onprogress = function(e) {
    if (e.lengthComputable && el) {
      var pct = Math.round(e.loaded / e.total * 100);
      el.innerHTML = '<div style="background:rgba(26,58,92,.08);border-radius:var(--r);padding:14px;margin-bottom:16px">' +
        '<div style="font-size:13px;color:var(--az);font-weight:600;margin-bottom:8px">&#8679; Subiendo grabacion... ' + pct + '%</div>' +
        '<div style="background:var(--bo);border-radius:999px;height:6px"><div style="background:var(--az);width:' + pct + '%;height:6px;border-radius:999px;transition:width .3s"></div></div>' +
        '</div>';
    }
  };

  xhr.onload = function() {
    if (xhr.status === 200) {
      var resp = JSON.parse(xhr.responseText);
      var url = resp.secure_url;
      var reuns = DB.reuniones();
      var idx = reuns.findIndex(function(x) { return x.id === ridId; });
      if (idx >= 0) {
        reuns[idx].audioUrl = url;
        reuns[idx].audioDur = dur;
        DB.s('reuniones', reuns);
      }
      GRAB.subiendo = false;
      updGrabStatus();
      toast('Grabacion subida correctamente');
    } else {
      console.error('Cloudinary error:', xhr.responseText);
      GRAB.subiendo = false; GRAB.blob = blob;
      toast('Error al subir - descarga manual disponible');
      updGrabStatus();
    }
  };

  xhr.onerror = function() {
    GRAB.subiendo = false; GRAB.blob = blob;
    toast('Error de red - descarga manual disponible');
    updGrabStatus();
  };

  xhr.send(formData);
}

function fmtDur(s) {
  var h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sc = s%60;
  var pad = function(n) { return n < 10 ? '0'+n : ''+n; };
  return (h > 0 ? pad(h)+':' : '') + pad(m) + ':' + pad(sc);
}

function impJSON(e) {
  var file = e.target.files[0]; if (!file) return;
  var r = new FileReader();
  r.onload = function(ev) {
    try {
      var d = JSON.parse(ev.target.result);
      if (!d.obras || !d.visitas || !d.reuniones) { toast('Fichero no valido'); return; }
      if (!confirm('Importar? Se reemplazaran los datos actuales.\n\n' + d.obras.length + ' obras, ' + d.visitas.length + ' visitas, ' + d.reuniones.length + ' reuniones.')) return;
      DB.s('obras', d.obras); DB.s('visitas', d.visitas); DB.s('reuniones', d.reuniones);
      if (d.cfg) localStorage.setItem('cfg', JSON.stringify(d.cfg));
      d.obras.forEach(function(o) { if (d['ao_' + o.id]) localStorage.setItem('ao_' + o.id, JSON.stringify(d['ao_' + o.id])); });
      toast('Datos importados'); setTimeout(function() { location.reload(); }, 1200);
    } catch(err) { toast('Error al leer el fichero'); }
  };
  r.readAsText(file); e.target.value = '';
}

  h += '</div>';

  if (v.sso) h += '<div class="sec">Seguridad y Salud</div><div class="tb">' + v.sso + '</div>';

  if (v.fSSO && v.fSSO.length) { h += '<div class="sec">Fotos S&amp;S (' + v.fSSO.length + ')</div><div class="fgpdf">'; v.fSSO.forEach(function(f) { h += '<div class="fi"><img src="' + f.d + '"></div>'; }); h += '</div>'; }
  h += '</div><div class="footer"><span>Informe - Visita de Obra App</span><span>' + gen + '</span></div></body></html>';
  impr(h, nom);
}

function pdfR(id) {
  var r = DB.reuniones().find(function(x) { return x.id === id; }); if (!r) return;
  var o = DB.obras().find(function(x) { return x.id === r.obraId; });
  var cfg = DB.cfg(); var d = new Date(r.fecha + 'T00:00:00'); var gen = new Date().toLocaleString('es-ES');
  var nom = nPDFR(r);
  var h = '<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>' + nom + '</title>' + CPDF + '</head><body>';
  h += '<div class="hdr"><div><h1>Acta de Reunion de Obra</h1><div class="sub">' + (o?o.nombre:'') + '</div>' + (cfg.emp?'<div style="font-size:8pt;opacity:.65">'+cfg.emp+'</div>':'') + '</div>';
  h += '<div style="text-align:right"><div style="font-size:10pt;font-weight:700">ACTA</div><div style="font-size:8pt;opacity:.65">Generado: ' + gen + '</div></div></div>';
  h += '<div class="body"><div class="sec">Datos de la reunion</div><div class="meta">';
  h += '<div class="mi"><div class="ml">Fecha</div><div class="mv">' + d.getDate() + ' de ' + MESL[d.getMonth()] + ' de ' + d.getFullYear() + '</div></div>';
  h += '<div class="mi"><div class="ml">Hora</div><div class="mv">' + r.hora + ' h</div></div>';
  if (r.lugar) h += '<div class="mi"><div class="ml">Lugar</div><div class="mv">' + r.lugar + '</div></div>';
  h += '</div>';
  if (r.acuerdos) h += '<div class="sec">Acuerdos adoptados</div><div class="tb">' + r.acuerdos + '</div>';
  if (r.proxima) h += '<div class="sec">Proxima reunion</div><div class="mi" style="display:inline-block"><div class="mv">' + r.proxima + '</div></div>';
  if (r.asis && r.asis.length) {
    h += '<div class="sec">Asistentes y firmas (' + r.asis.length + ')</div>';
    r.asis.forEach(function(a) { h += '<div class="ar"><div class="ain"><div class="an">' + a.nom + '</div><div class="as">' + (a.emp||'') + (a.cargo?' &middot; '+a.cargo:'') + (a.email?' - '+a.email:'') + '</div></div><div><div class="fb"></div><div class="fl">Firma</div></div></div>'; });
  }
  if (r.fotos && r.fotos.length) { h += '<div class="sec">Fotografias (' + r.fotos.length + ')</div><div class="fgpdf">'; r.fotos.forEach(function(f) { h += '<div class="fi"><img src="' + f.d + '"></div>'; }); h += '</div>'; }
  h += '</div><div class="footer"><span>Acta - Visita de Obra App</span><span>' + gen + '</span></div></body></html>';
  impr(h, nom);
}

function impr(h, nom) {
  var w = window.open('', '_blank');
  w.document.write(h); w.document.close();
  w.onload = function() { w.focus(); w.print(); };
}

// ---- BORRAR ----
function borrarObra() {
  var o = DB.obras().find(function(x) { return x.id === S.obraId; });
  if (!confirm('Borrar la obra "' + (o ? o.nombre : '') + '" y TODAS sus visitas y reuniones? Esta accion no se puede deshacer.')) return;
  // Borrar visitas de la obra
  var vis = DB.visitas().filter(function(v) { return v.obraId !== S.obraId; });
  DB.s('visitas', vis);
  // Borrar reuniones de la obra
  var reu = DB.reuniones().filter(function(r) { return r.obraId !== S.obraId; });
  DB.s('reuniones', reu);
  // Borrar asistentes habituales
  localStorage.removeItem('ao_' + S.obraId);
  FSdb.collection('datos').doc('ao_' + S.obraId).delete().catch(function(){});
  // Borrar obra
  var obras = DB.obras().filter(function(x) { return x.id !== S.obraId; });
  DB.s('obras', obras);
  toast('Obra borrada');
  S.stack = [];
  showPg('obras', false);
  rndObras();
}

// ---- AUTOGUARDADO DE BORRADOR ----
var _draftTimer = null;
function startDraftAutosave() {
  clearInterval(_draftTimer);
  _draftTimer = setInterval(function() {
    if (S.pg !== 'vform') return;
    lVF();
    try {
      var draft = { vF: S.vF, vFotos: S.vFotos, vFSSO: S.vFSSO, vIncs: S.vIncs, obraId: S.obraId, ts: Date.now() };
      localStorage.setItem('borrador_visita', JSON.stringify(draft));
    } catch(e) { /* sin espacio, no interrumpir */ }
  }, 30000);
}
function clearDraft() { try { localStorage.removeItem('borrador_visita'); } catch(e) {} }
function checkAndRestoreDraft() {
  try {
    var raw = localStorage.getItem('borrador_visita');
    if (!raw) return false;
    var draft = JSON.parse(raw);
    var age = Math.round((Date.now() - draft.ts) / 60000);
    if (age > 480) { clearDraft(); return false; }
    if (confirm('Hay un borrador de visita sin guardar (hace ' + age + ' min).\n¿Recuperarlo?')) {
      S.vF = draft.vF || {};
      S.vFotos = draft.vFotos || [];
      S.vFSSO  = draft.vFSSO  || [];
      S.vIncs  = draft.vIncs  || [];
      if (draft.obraId) S.obraId = draft.obraId;
      clearDraft();
      return true;
    } else { clearDraft(); return false; }
  } catch(e) { return false; }
}

// INIT - gestionado por onAuthStateChanged (ver bloque de autenticación arriba)
// loadFromLocalStorage(), rndObras(), updFAB(), uploadLocalToFirestore(), initSync()
// se llaman solo después de autenticación válida.

function uploadLocalToFirestore() {
  // Solo sube si hay datos locales que Firestore no tiene aun
  var keys = ['obras','visitas','reuniones','cfg'];
  keys.forEach(function(k) {
    var val = localStorage.getItem(k);
    if (!val) return;
    FSdb.collection('datos').doc(k).get().then(function(doc) {
      if (!doc.exists) {
        // Solo sube si Firestore no tiene este documento
        FSdb.collection('datos').doc(k).set({valor: val})
          .catch(function(e) { console.warn('Upload error:', k, e); });
      }
    }).catch(function() {});
  });
  // Subir asistentes habituales
  try {
    var obras = JSON.parse(localStorage.getItem('obras') || '[]');
    obras.forEach(function(o) {
      var val = localStorage.getItem('ao_' + o.id);
      if (!val) return;
      FSdb.collection('datos').doc('ao_' + o.id).get().then(function(doc) {
        if (!doc.exists) {
          FSdb.collection('datos').doc('ao_' + o.id).set({valor: val})
            .catch(function(e) { console.warn('Upload ao error:', e); });
        }
      }).catch(function() {});
    });
  } catch(e) {}
}
